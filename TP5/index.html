<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TP 5 – BTS SIO SISR</title>
  <style>
    :root {
      --bg-main: #050608;
      --bg-panel: #0b0d11;
      --border: #1a1d23;
      --text-main: #f3f4f6;
      --text-muted: #9aa0aa;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      min-height: 100vh;
      font-family: 'Fira Code', monospace, system-ui, sans-serif;
      background: radial-gradient(circle at top, #0a0c12, var(--bg-main));
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
    }
    #particles {
      position: fixed;
      inset: 0;
      z-index: -1;
    }
    .page {
      width: 100%;
      max-width: 900px;
      padding: 4rem 2rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      margin-bottom: 4rem;
    }
    .title {
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #ffffff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
    }
    .title::after {
      content: '';
      display: block;
      width: 100px;
      height: 3px;
      background: var(--accent);
      margin: 16px auto 0;
      border-radius: 2px;
      opacity: 0.5;
    }
    .subtitle {
      margin-top: 1.2rem;
      font-size: 1.2rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    main {
      width: 100%;
      max-width: 700px;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.6rem;
      margin-top: 2.5rem;
    }
    .btn {
      background: linear-gradient(180deg, #0d1016, #080a0f);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.6rem 2.2rem;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-main);
      text-decoration: none;
      transition:
        transform 0.3s ease,
        border-color 0.3s ease,
        box-shadow 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 12px 35px rgba(37, 99, 235, 0.15);
    }
    footer {
      margin-top: 5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      opacity: 0.55;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="page">
    <header>
      <h1 class="title">TP 5</h1>
      <p class="subtitle">
        BTS Services Informatiques aux Organisations<br>
        Option SISR – Valence 2026
      </p>
    </header>

    <main>
      <section class="buttons">
        <a href="exercice1.html" class="btn">Exercice 1</a>
        <a href="exercice2.html" class="btn">Exercice 2</a>
        <a href="exercice3.html" class="btn">Exercice 3</a>
      </section>
    </main>

    <footer>
      BTS SIO 2026
    </footer>
  </div>

  <script>
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let stars = [];
    const STAR_COUNT = 180;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    class Star {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.radius = Math.random() * 1.3 + 0.4;
        this.speed = Math.random() * 0.3 + 0.06;
        this.alpha = Math.random() * 0.5 + 0.12;
      }
      update() {
        this.y += this.speed;
        if (this.y > canvas.height) {
          this.y = -this.radius * 2;
          this.x = Math.random() * canvas.width;
        }
      }
      draw() {
        ctx.fillStyle = `rgba(230,235,255,${this.alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initStars() {
      stars = [];
      for (let i = 0; i < STAR_COUNT; i++) {
        stars.push(new Star());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(star => {
        star.update();
        star.draw();
      });
      requestAnimationFrame(animate);
    }

    initStars();
    animate();
  </script>
</body>
</html>
