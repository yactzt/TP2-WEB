    <style>
        body {
            margin: 0;

            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;

            text-align: center;
            width: 320px;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }

        .btn {
            display: block;
            margin: 15px 0;
            padding: 12px;
            text-decoration: none;
            color: white;
            background-color: #4e73df;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #2e59d9;
            transform: scale(1.05);
        }
    </style>
</head>
